name: 功能请求
description: 新功能或改进建议
labels: [enhancement]
body:
  - type: textarea
    id: scenario
    attributes:
      label: 使用场景
      description: 你在什么情况下需要它，现在是怎么绕过的
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: 期望的样子
      description: 大概的交互或效果，不需要技术方案
    validations:
      required: true
